name: Publish core to npm

on:
  push:
    tags:
      - 'core@*'

# Only one publish run at a time per tag, no cancelling — publishes must finish.
concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # for creating the GitHub Release
      id-token: write   # for npm provenance (optional but nice)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full gate (check + test + build)
        run: pnpm check && pnpm test && pnpm build

      - name: Verify tag matches package version
        working-directory: packages/core
        run: |
          TAG="${GITHUB_REF_NAME#core@}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $TAG does not match package version $PKG" >&2
            exit 1
          fi
          echo "Tag $TAG matches package version $PKG"

      - name: Publish to npm
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
