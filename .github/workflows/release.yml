name: Publish all packages to npm

# Triggered by pushing a version tag like `v0.0.8`. Publishes every public
# package in the workspace via `changeset publish` — the single-tag,
# multi-package release path used from 0.0.8 onward.
#
# (The older `core@*`-tag-triggered `publish.yml` still exists for the
# specsnap-core-only publish path, but v-tag is the preferred workflow.)

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full gate (build + check + test)
        # Order matters: build FIRST so packages/core/dist/*.d.ts exists
        # before packages/inspector-core's tsc tries to resolve the core
        # workspace import. Check-before-build was the bug in the initial
        # v0.0.8 CI run — hit TS2307 "Cannot find module '@tw199501/specsnap-core'"
        # across 6 files in inspector-core. Same gotcha applies to local
        # `pnpm check` — always run `pnpm build` first on a fresh clone.
        run: pnpm build && pnpm check && pnpm test

      - name: Verify tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: $GITHUB_REF_NAME  →  version $TAG_VERSION"
          for pkg in core inspector-core inspector-vue inspector-react; do
            PKG_VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "packages/${pkg}/package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
              exit 1
            fi
          done
          echo "All 4 packages at $TAG_VERSION — OK"

      - name: Write .npmrc (both $HOME and repo root) with literal token
        # Previous 4 attempts showed that neither setup-node's $HOME/.npmrc
        # placeholder-expansion nor a repo-root .npmrc was picked up by
        # `changeset publish`'s subprocess chain — every package hit ENEEDAUTH.
        # Writing to BOTH locations + switching to `pnpm publish -r` (which
        # reliably reads .npmrc) instead of `changeset publish`.
        run: |
          NPMRC_LINE="//registry.npmjs.org/:_authToken=${NPM_TOKEN}"
          echo "$NPMRC_LINE" > $HOME/.npmrc
          echo "registry=https://registry.npmjs.org/" >> $HOME/.npmrc
          echo "$NPMRC_LINE" > .npmrc
          echo "registry=https://registry.npmjs.org/" >> .npmrc
          # Sanity check: verify lines landed, but mask the token in log.
          echo "--- $HOME/.npmrc (redacted) ---"
          sed "s|${NPM_TOKEN}|***REDACTED***|g" $HOME/.npmrc
          echo "--- ./.npmrc (redacted) ---"
          sed "s|${NPM_TOKEN}|***REDACTED***|g" .npmrc
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish all packages via pnpm -r
        # pnpm publish -r respects .npmrc auth reliably. --no-git-checks
        # because we're on a detached tag, --access public for @scope/*.
        # Order: core first (others depend on it), then inspector-*.
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish -r --access public --no-git-checks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
