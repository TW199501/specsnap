name: Publish all packages to npm

# Triggered by pushing a version tag like `v0.0.8`. Publishes every public
# package in the workspace via `changeset publish` — the single-tag,
# multi-package release path used from 0.0.8 onward.
#
# (The older `core@*`-tag-triggered `publish.yml` still exists for the
# specsnap-core-only publish path, but v-tag is the preferred workflow.)

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Full gate (check + test + build)
        run: pnpm check && pnpm test && pnpm build

      - name: Verify tag matches workspace version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag: $GITHUB_REF_NAME  →  version $TAG_VERSION"
          for pkg in core inspector-core inspector-vue inspector-react; do
            PKG_VERSION=$(node -p "require('./packages/${pkg}/package.json').version")
            if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
              echo "packages/${pkg}/package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)" >&2
              exit 1
            fi
          done
          echo "All 4 packages at $TAG_VERSION — OK"

      - name: Publish via changesets
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
